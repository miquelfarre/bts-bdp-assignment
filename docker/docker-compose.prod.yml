services:
  neo4j:
    image: neo4j:5
    container_name: bdi-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bdi-api
    ports:
      - "8080:8080"
    environment:
      BDI_NEO4J_URL: bolt://neo4j:7687
      BDI_NEO4J_USER: neo4j
      BDI_NEO4J_PASSWORD: password123
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
