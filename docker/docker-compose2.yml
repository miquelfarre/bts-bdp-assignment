services:
  minio:
    image: minio/minio:latest
    container_name: bdi-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: bdi-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/bronze &&
      mc mb --ignore-existing local/silver &&
      echo 'Buckets created successfully'
      "

  airflow:
    image: apache/airflow:2.10.4-python3.11
    container_name: bdi-airflow
    depends_on:
      minio:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "true"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
      BDI_S8_DB_PATH: /opt/airflow/data/s8/aircraft.db
    ports:
      - "8080:8080"
    volumes:
      - ../dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -c "pip install pandas pyarrow s3fs boto3 requests pyyaml &&
               airflow standalone"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  airflow_logs:
  minio_data: